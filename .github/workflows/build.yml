name: Build Windows Driver

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2
      
    - name: Restore NuGet packages
      run: nuget restore -PackagesDirectory "./packages"
      
    - name: Install Windows Driver Kit
      run: |
        # Download and install WDK
        Write-Host "Downloading WDK..."
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2257245" -OutFile "wdksetup.exe"
        
        Write-Host "Installing WDK (this may take a few minutes)..."
        Start-Process -FilePath ".\wdksetup.exe" -ArgumentList "/features", "+", "/quiet", "/norestart" -Wait
        
        Write-Host "WDK installation complete!"
      continue-on-error: true
      
    - name: Build driver with MSBuild
      run: |
        Write-Host "Building driver..."
        msbuild HideProcessMini.vcxproj /p:Configuration=Release /p:Platform=x64 /t:Rebuild /v:detailed
        
    - name: List build output
      run: |
        Write-Host "=== Build output directory ==="
        if (Test-Path "HideProcessMini\x64\Release") {
            Get-ChildItem -Path "HideProcessMini\x64\Release" -Recurse | Format-Table Name, Length
        }
        
        Write-Host ""
        Write-Host "=== Looking for .sys files ==="
        Get-ChildItem -Path . -Recurse -Filter "*.sys" | Format-Table FullName, Length
        
    - name: Find and upload all .sys files
      uses: actions/upload-artifact@v4
      with:
        name: compiled-driver
        path: |
          **/*.sys
          **/*.inf
          **/*.cat
          **/*.pdb
          
    - name: Upload full build output
      uses: actions/upload-artifact@v4
      with:
        name: full-build-output
        path: |
          HideProcessMini/x64/Release/
          ObRegisterCallbacks/x64/Release/
          
    - name: Check all files
      run: |
        Write-Host "=== All files in repository ==="
        Get-ChildItem -Path . -Recurse -File | Select-Object Name, @{Name="Size(KB)";Expression={[math]::Round($_.Length/1KB,2)}} | Format-Table -AutoSize  
        
